kind = "web"
previewPath = "/"
title = "Sangam Kirana Store"
version = "1.0.0"
id = "artifacts/sangam-kirana"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26230

[services.development]
run = "pnpm --filter @workspace/sangam-kirana run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sangam-kirana", "run", "build" ]
publicDir = "artifacts/sangam-kirana/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26230"
BASE_PATH = "/"
